$schema: "inst_schema.json#"
kind: instruction
name: c.mop.3
long_name: "Compressed May-Be Operation 3"
description: |
  C.MOP.3 is a 16-bit compressed instruction from the Zcmop extension.
  It is defined not to write any register but may be redefined to read register x3.
  The encoding uses a reserved space from C.LUI and is intended to expand to a
  corresponding Zimop operation.
definedBy:
  allOf:
    - Zcmop
    - Zca
assembly: "C.MOP.3"
encoding:
  match: "0110000110000001"
access:
  s: always
  u: always
  vs: always
  vu: always
operation(): |
  # Expand to corresponding Zimop operation.
  # Implicitly accesses register x3.
