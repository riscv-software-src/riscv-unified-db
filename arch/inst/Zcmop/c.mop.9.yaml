$schema: "inst_schema.json#"
kind: instruction
name: c.mop.9
long_name: "Compressed May-Be Operation 9"
description: |
  C.MOP.9 is a 16-bit compressed instruction in the Zcmop extension.
  Although it does not perform a register write by default, it is designed to be
  redefined to read register x9 if needed. The instruction uses a reserved
  encoding from the C.LUI space.
definedBy:
  anyOf:
    - Zcmop
    - Zca
assembly: "C.MOP.9"
encoding:
  match: "0110010010000001"
access:
  s: always
  u: always
  vs: always
  vu: always
operation(): |
  # Expand to corresponding Zimop operation.
  # Implicitly accesses register x9.
